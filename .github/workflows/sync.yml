name: Sync zilnic licitatii

on:
  schedule:
    - cron: '0 2 * * *'  # În fiecare noapte la 02:00 UTC (04:00 ora României)
  workflow_dispatch:       # Permite și rulare manuală

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync CAN
        run: |
          curl -f "https://demo-elicitatii.vercel.app/api/sync?source=CAN" || exit 1

      - name: Sync CN
        run: |
          curl -f "https://demo-elicitatii.vercel.app/api/sync?source=CN" || exit 1