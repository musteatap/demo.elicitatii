name: Sync zilnic licitatii

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync CAN
        run: |
          curl -f "https://demo-elicitatii.vercel.app/api/sync?source=CAN"

      - name: Sync CN
        run: |
          curl -f "https://demo-elicitatii.vercel.app/api/sync?source=CN"

      - name: Sync Achizitii Directe
        run: |
          curl -f "https://demo-elicitatii.vercel.app/api/sync-achizitii"